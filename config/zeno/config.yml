snippets:
  # ===================
  # Shell Basics
  # ===================
  - name: clear
    keyword: cls
    snippet: clear
  - name: cp interactive
    keyword: cp
    snippet: cp -i
  - name: mv interactive
    keyword: mc
    snippet: mv -i
  - name: rm interactive
    keyword: rm
    snippet: rm -i
  - name: ls all
    keyword: ll
    snippet: ls -al
  - name: mkdir -p
    keyword: mkdir
    snippet: mkdir -p

  # ===================
  # Git
  # ===================
  - name: git status
    keyword: gs
    snippet: git status --short --branch
  - name: git branch
    keyword: gb
    snippet: git branch
  - name: git add
    keyword: ga
    snippet: git add {{file}}
  - name: git add all
    keyword: gaa
    snippet: git add --all
  - name: git commit
    keyword: gci
    snippet: git commit
  - name: git commit message
    keyword: gcim
    snippet: git commit -m '{{commit_message}}'
  - name: git commit fixup
    keyword: gcif
    snippet: git fixup {{commit_id}}
  - name: git diff
    keyword: gd
    snippet: git diff
  - name: git diff branch
    keyword: gd
    snippet: git diff {{branch}}
  - name: git diff file
    keyword: gd
    snippet: git diff -- {{file}}
  - name: git diff branch file
    keyword: gd
    snippet: git diff {{branch}} -- {{file}}
  - name: git diff 2 branch
    keyword: gd
    snippet: git diff {{branch1}} {{branch2}}
  - name: git diff 2 branch file
    keyword: gd
    snippet: git diff {{branch1}} {{branch2}} -- {{file}}
  - name: git diff cached
    keyword: gdc
    snippet: git diff --cached
  - name: git diff cached file
    keyword: gdc
    snippet: git diff --cached -- {{file}}
  - name: git checkout
    keyword: gco
    snippet: git checkout {{branch}}
  - name: git checkout file
    keyword: gcof
    snippet: git checkout -- {{file}}
  - name: git checkout branch file
    keyword: gcof
    snippet: git checkout {{branch}} -- {{file}}
  - name: git checkout track
    keyword: gcot
    snippet: git checkout --track {{origin_branch}}
  - name: git reset
    keyword: gre
    snippet: git reset {{branch}}
  - name: git reset file
    keyword: gre
    snippet: git reset -- {{file}}
  - name: git reset hard
    keyword: gre
    snippet: git reset --hard {{branch}}
  - name: git stash
    keyword: gst
    snippet: git stash
  - name: git stash untracked
    keyword: gstu
    snippet: git stash -u
  - name: git stash list
    keyword: gstl
    snippet: git stash list
  - name: git stash show
    keyword: gsts
    snippet: git stash show {{stash}}
  - name: git stash apply
    keyword: gsta
    snippet: git stash apply {{stash}}
  - name: git stash pop
    keyword: gstp
    snippet: git stash pop {{stash}}
  - name: git stash drop
    keyword: gstd
    snippet: git stash drop {{stash}}
  - name: git push
    keyword: gp
    snippet: git push
  - name: git push force-with-lease
    keyword: gpf
    snippet: git push --force-with-lease
  - name: git push set-upstream
    keyword: gpu
    snippet: git push --set-upstream
  - name: git pull autostash
    keyword: gP
    snippet: git pull --autostash
  - name: git rebase squash
    keyword: squash
    snippet: git rebase --interactive --autosquash {{branch}}
  - name: git rebase squash auto
    keyword: squash
    snippet: GIT_EDITOR=cat git rebase --interactive --autosquash {{branch}}

  # --- Context-aware git snippets ---
  - name: git push safe force
    keyword: -f
    snippet: --force-with-lease
    context:
      lbuffer: '^git push(\s+\S+)*\s+'
  - name: git push set upstream
    keyword: -u
    snippet: --set-upstream
    context:
      lbuffer: '^git push(\s+\S+)*\s+'
  - name: default branch
    keyword: B
    snippet: git symbolic-ref --short refs/remotes/origin/HEAD | sed 's!.*/!!'
    context:
      lbuffer: '^git\s+'
    evaluate: true

  # ===================
  # Redirect & Pipe
  # ===================
  - name: "null"
    keyword: "null"
    snippet: ">/dev/null 2>&1"
    context:
      lbuffer: '.+\s+'
  - name: stdout to null
    keyword: null1
    snippet: ">/dev/null"
    context:
      lbuffer: '.+\s+'
  - name: stderr to null
    keyword: null2
    snippet: "2>/dev/null"
    context:
      lbuffer: '.+\s+'
  - name: pipe vim
    keyword: V
    snippet: "| vi"
    context:
      lbuffer: '.+\s'

  # ===================
  # Project Navigation
  # ===================
  - name: project selector
    keyword: p
    snippet: z (ghq list -p | fzf)
  - name: ghq get
    keyword: gg
    snippet: ghq get

  # ===================
  # Docker
  # ===================
  - name: docker
    keyword: d
    snippet: docker
  - name: docker compose
    keyword: dc
    snippet: docker compose

  # ===================
  # Brew
  # ===================
  - name: brew
    keyword: b
    snippet: brew
  - name: brew update
    keyword: bu
    snippet: brew update && brew outdated
  - name: brew upgrade
    keyword: bg
    snippet: brew upgrade

  # ===================
  # AI Tools
  # ===================
  - name: claude
    keyword: c
    snippet: claude --dangerously-skip-permissions --model opus --effort high
  - name: claude bedrock
    keyword: cb
    snippet: env CLAUDE_CODE_USE_BEDROCK=1 claude --dangerously-skip-permissions --model opus --effort high
  - name: codex
    keyword: co
    snippet: codex
  - name: codex yolo
    keyword: yolo
    snippet: codex --yolo
  - name: codex oneline
    keyword: '?'
    snippet: codex --config model_reasoning_effort="low" exec "{{prompt}}" 2>/dev/null
  - name: claude oneline
    keyword: '??'
    snippet: claude --print --model haiku "{{prompt}}"

  # ===================
  # macOS
  # ===================
  - name: disable desktop
    keyword: disable_desktop
    snippet: defaults write com.apple.finder CreateDesktop -boolean false; killall Finder
  - name: enable desktop
    keyword: enable_desktop
    snippet: defaults write com.apple.finder CreateDesktop -boolean true; killall Finder

completions:
  - name: kill
    patterns:
      - "^kill( -9)? $"
    sourceCommand: "procs --color=always"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
      --exact: true
      --header-lines: 2
    callback: "perl -lane 'print $F[0]'"
  - name: git fixup
    patterns:
      - "^git fixup $"
    sourceCommand: "git log --decorate --color=always --format='%C(green)[commit] %C(magenta)%h%x09%C(yellow)%cr%x09%C(blue)[%an]%x09%C(auto)%s%d' | column -t -s $'\\t'"
    options:
      --prompt: "'Git fixup> '"
      --exact: true
      --no-sort: true
      --preview: "git show --color=always {2}"
    callback: "awk '{print $2}'"

history:
  defaultScope: global
  fzfOptions:
    - "--exact"
    - "--no-sort"
  redact:
  keymap:
    deleteSoft: ctrl-d
    deleteHard: alt-d
    toggleScope: ctrl-r
    togglePreview: "?"
